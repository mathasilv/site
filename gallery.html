<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria — MATHASILV's LAB</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .photo-grid { text-align: center; }
    /* na galeria, os thumbs são 200x150; no preview da home, 100x100 */
    .photo-frame img { width: 200px; height: 150px; }
  </style>
</head>

<body>
  <table class="main-container" cellspacing="0" cellpadding="0">
    <tr>
      <td colspan="2" style="background-color:#000022;padding:10px;border-bottom:4px solid #C0C0C0;">
        <div class="marquee-container">
          <marquee scrollamount="5" scrolldelay="100">
            VISUAL ARCHIVE DATABASE — AUTO LOAD FROM photos/photos.json
          </marquee>
        </div>
      </td>
    </tr>

    <tr>
      <!-- LEFT NAV -->
      <td valign="top" width="200" style="background-color:#C0C0C0;border-right:2px solid #606060;padding:10px;">
        <div id="site-nav"></div>
      </td>

      <!-- MAIN -->
      <td valign="top" style="padding:20px;">
        <h2 class="text-3d">GALERIA</h2>

        <div class="gallery-stats">
          IMAGES LOADED: <span id="img-count">0</span>
        </div>

        <div id="photo-grid" class="photo-grid"></div>

        <hr class="retro" />

        <div style="text-align:center;color:#00ffff;font-family:'Courier New',monospace;">
          END OF VISUAL ARCHIVE — <a href="#top">SCROLL TO TOP</a>
        </div>
      </td>
    </tr>

    <tr>
      <td colspan="2" align="center"
        style="background-color:#000000;border-top:4px solid #C0C0C0;padding:10px;color:#666;">
        <p>
          <a href="index.html">HOME</a> |
          <a href="projects.html">POSTS</a> |
          <a href="mailto:msouza449@gmail.com">CONTACT</a>
        </p>
        <p style="font-size:10px;">
          COPYRIGHT &copy; 1999-2026 MATHASILV. ALL RIGHTS RESERVED.
        </p>
      </td>
    </tr>
  </table>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <img id="lightbox-img" src="" alt="Lightbox image" />
    <div id="lightbox-info"></div>
    <div id="lightbox-close">CLOSE WINDOW — ESC / CLIQUE</div>
  </div>

  <script src="assets/site.js" defer></script>
  <script src="assets/nav.js" defer></script>
  <script>
    var PHOTO_DIR = "photos/";

    fetch(PHOTO_DIR + "photos.json")
      .then(function (r) { return r.json(); })
      .then(function (list) {
        var grid = document.getElementById("photo-grid");
        grid.innerHTML = "";
        list.forEach(function (item) {
          var file = (typeof item === "string") ? item : item.file;
          var caption = (typeof item === "string") ? item : (item.caption || item.file);

          var frame = document.createElement("div");
          frame.className = "photo-frame";

          var img = document.createElement("img");
          img.loading = "lazy";
          img.alt = caption || file;
          img.src = PHOTO_DIR + file;
          img.setAttribute("data-lightbox", caption || file);

          var cap = document.createElement("div");
          cap.className = "caption";
          cap.textContent = caption || file;

          frame.appendChild(img);
          frame.appendChild(cap);
          grid.appendChild(frame);
        });
        document.getElementById("img-count").textContent = String(list.length);
      })
      .catch(function () {
        document.getElementById("photo-grid").innerHTML =
          "<div class='panel-inset'>Erro: não achei photos/photos.json</div>";
      });
  </script>
</body>

</html>
