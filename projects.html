<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posts — MATHASILV's LAB</title>
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>
  <table class="main-container" cellspacing="0" cellpadding="0">
    <tr>
      <td colspan="2" style="background-color:#000022;padding:10px;border-bottom:4px solid #C0C0C0;">
        <table width="100%">
          <tr>
            <td width="100">
              <img src="photos/spinning-planet.gif" width="80" alt="Spinning Planet" loading="lazy">
            </td>
            <td align="center">
              <h1 class="text-3d" style="font-size:32px;margin:0;">MATHASILV's LAB</h1>
              <p style="color:#00FFFF;font-family:'Courier New',monospace;margin:5px;">POST ARCHIVE</p>
            </td>
            <td width="100" align="right">
              <img src="photos/satellite.gif" width="80" alt="Satellite" loading="lazy">
            </td>
          </tr>
        </table>

        <div class="marquee-container">
          <marquee scrollamount="5" scrolldelay="100">
            POSTS DATABASE — SIMPLE BLOG MODE — CLICK TO READ
          </marquee>
        </div>
      </td>
    </tr>

    <tr>
      <!-- LEFT NAV -->
      <td valign="top" width="200" style="background-color:#C0C0C0;border-right:2px solid #606060;padding:10px;">
        <div id="site-nav"></div>
      </td>

      <!-- MAIN -->
      <td valign="top" style="padding:20px;">
        <h2 class="text-3d">POSTS</h2>
        <p style="color:#00FFFF;font-family:'Courier New',monospace;">
          Lista automática via posts/posts.json
        </p>

        <hr class="retro" />

        <div id="post-list">Carregando...</div>
      </td>
    </tr>

    <tr>
      <td colspan="2" align="center"
        style="background-color:#000000;border-top:4px solid #C0C0C0;padding:10px;color:#666;">
        <p>
          <a href="index.html">RETURN TO HOME</a> |
          <a href="gallery.html">VIEW GALLERY</a> |
          <a href="mailto:msouza449@gmail.com">CONTACT</a>
        </p>
        <p style="font-size:10px;">
          COPYRIGHT &copy; 1999-2026 MATHASILV. ALL RIGHTS RESERVED.
        </p>
      </td>
    </tr>
  </table>

  <script src="assets/site.js"></script>
  <script src="assets/nav.js"></script>
  <script>
    fetch("posts/posts.json")
      .then(function (r) { return r.json(); })
      .then(function (posts) {
        var root = document.getElementById("post-list");
        var sorted = posts.slice().sort(function (a, b) {
          return (b.date || "").localeCompare(a.date || "");
        });

        if (!sorted.length) {
          root.innerHTML = "<div class='panel-inset'>Nenhum post ainda.</div>";
          return;
        }

        root.innerHTML = "";
        sorted.forEach(function (p) {
          var box = document.createElement("div");
          box.className = "post-item";
          var t = Site.esc(p.title || "Sem título");
          var d = Site.esc(p.date || "");
          var e = Site.esc(p.excerpt || "");
          var id = encodeURIComponent(p.id || "");
          box.innerHTML =
            "<h3>" + t +
            '  <span style="float:right;color:#00FFFF;font-family:\'Courier New\',monospace;font-size:11px;">' + d + "</span>" +
            "</h3>" +
            '<p style="margin:10px 0;color:#CCCCCC;">' + e + "</p>" +
            '<p style="margin:0;"><a href="post.html?id=' + id + '">LER</a></p>';
          root.appendChild(box);
        });
      })
      .catch(function () {
        document.getElementById("post-list").innerHTML =
          "<div class='panel-inset'>Erro: não achei posts/posts.json</div>";
      });
  </script>
</body>

</html>
