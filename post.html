<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post</title>
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>
  <table class="main-container" cellspacing="0" cellpadding="0">
    <tr>
      <td colspan="2" style="background-color:#000022;padding:10px;border-bottom:4px solid #C0C0C0;">
        <div class="marquee-container">
          <marquee scrollamount="5" scrolldelay="100">
            POST VIEWER — LOADING FROM posts/<id>.html
          </marquee>
        </div>
      </td>
    </tr>

    <tr>
      <!-- LEFT NAV -->
      <td valign="top" width="200" style="background-color:#C0C0C0;border-right:2px solid #606060;padding:10px;">
        <div id="site-nav"></div>
      </td>

      <!-- MAIN -->
      <td valign="top" style="padding:20px;">
        <div id="post-root" class="panel-inset">Carregando...</div>
        <hr class="retro" />
        <p style="margin:0;">
          <a href="projects.html">&larr; Voltar para posts</a>
        </p>
      </td>
    </tr>

    <tr>
      <td colspan="2" align="center"
        style="background-color:#000000;border-top:4px solid #C0C0C0;padding:10px;color:#666;">
        <p style="font-size:10px;">
          COPYRIGHT &copy; 1999-2026 MATHASILV. ALL RIGHTS RESERVED.
          LAST MODIFIED <span id="last-mod"></span>
        </p>
      </td>
    </tr>
  </table>

  <script src="assets/site.js"></script>
  <script src="assets/nav.js"></script>
  <script>
    (function () {
      "use strict";
      var params = new URLSearchParams(location.search);
      var id = params.get("id");

      var root = document.getElementById("post-root");

      // Validação: id deve ser apenas [a-z0-9-] pra evitar path traversal
      // (impede ?id=../foo) e nomes estranhos.
      function fail(msg, linkBack) {
        root.textContent = msg;
        if (linkBack) {
          var a = document.createElement("p");
          a.innerHTML = '<p style="margin-top:10px;"><a href="projects.html">&larr; Voltar para posts</a></p>';
          root.parentNode.insertBefore(a, null);
        }
      }

      if (!id) {
        fail("Erro: faltou ?id=...");
        return;
      }
      if (!/^[a-z0-9][a-z0-9-]*$/.test(id)) {
        fail("Erro: id de post inválido: \"" + id + "\"");
        return;
      }

      fetch("posts/" + encodeURIComponent(id) + ".html")
        .then(function (r) {
          if (!r.ok) throw new Error("not found");
          return r.text();
        })
        .then(function (html) {
          root.innerHTML = html;
          // Atualiza o <title> com base no manifesto (nice-to-have).
          fetch("posts/posts.json")
            .then(function (r) { return r.json(); })
            .then(function (posts) {
              var p = posts.filter(function (x) { return x.id === id; })[0];
              if (p && p.title) document.title = p.title;
            })
            .catch(function () { /* manifesto opcional aqui */ });
        })
        .catch(function () {
          fail("Post não encontrado: posts/" + id + ".html", true);
        });
    })();
  </script>
</body>

</html>
